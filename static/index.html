<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Media Download Hub</title><style>
:root{--bg:#07111f;--panel:#0c1a2c;--line:#244361;--text:#eef6ff;--muted:#9db3cc;--blue:#28a6ff;--purple:#8a24e8;--bad:#ff8ca1;--green:#4ee0a1}*{box-sizing:border-box}body{margin:0;background:linear-gradient(#07111f,#091727);font-family:system-ui,-apple-system,"PingFang SC",sans-serif;color:var(--text)}button,input,select,textarea{font:inherit}.hidden{display:none!important}.shell{max-width:1280px;margin:auto;padding:22px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.top h1{margin:0;font-size:24px}.muted{color:var(--muted)}.layout{display:grid;grid-template-columns:190px 1fr;gap:18px}.nav,.card{background:var(--panel);border:1px solid var(--line);border-radius:18px}.nav{height:max-content;padding:10px}.nav button{display:block;width:100%;border:0;background:transparent;color:var(--muted);padding:13px;text-align:left;border-radius:11px}.nav button.active{background:#17314f;color:#fff}.card{padding:22px;margin-bottom:18px}.field{display:flex;gap:10px}.field textarea{flex:1;min-height:90px;border:1px solid var(--line);border-radius:13px;background:#071320;color:#fff;padding:14px}.field select,.settings input{border:1px solid var(--line);border-radius:11px;background:#071320;color:#fff;padding:11px}.btn{border:0;border-radius:12px;padding:12px 18px;font-weight:700;cursor:pointer}.blue{background:var(--blue);color:white}.purple{background:var(--purple);color:white}.ghost{background:#17314f;color:#fff}.danger{background:#5b2233;color:#ffdbe2}.result{background:#eef3f9;color:#131c27;border-radius:16px;padding:26px}.title{font-size:22px;line-height:1.5;margin:0 0 20px}.quick{display:flex;justify-content:center;gap:14px;flex-wrap:wrap}.quick .btn{font-size:18px;min-width:170px}.quick .ghost{background:white;color:#111;border:2px solid #5f88ad}.resbox{background:#f9fbfe;margin-top:24px;padding:18px;border-radius:12px}.resbox h3{text-align:center;font-weight:500;margin:0 0 18px}.formats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.format{background:white;border:2px solid #5f88ad;border-radius:12px;padding:18px;color:#222;font-size:20px;font-weight:700;cursor:pointer}.format small{display:block;color:#617286;font-size:12px;margin-top:5px}.task{border:1px solid var(--line);border-radius:14px;padding:15px;margin-top:12px;background:#071320}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.space{justify-content:space-between}.progress{height:8px;background:#17314f;border-radius:99px;overflow:hidden;margin:12px 0}.progress span{display:block;height:100%;background:linear-gradient(90deg,#28a6ff,#4ee0a1)}.error{color:var(--bad);font-size:17px}.good{color:var(--green)}pre{white-space:pre-wrap;max-height:240px;overflow:auto}.modal{position:fixed;inset:0;background:#020812e8;display:grid;place-items:center;z-index:10}.modal .card{width:min(420px,90vw)}.modal input{width:100%;padding:12px;border-radius:10px;border:1px solid var(--line);background:#071320;color:#fff;margin:10px 0}.section{display:none}.section.active{display:block}.settings{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.settings label{display:grid;gap:7px}.pill{padding:8px 12px;border:1px solid var(--line);border-radius:999px}@media(max-width:850px){.layout{grid-template-columns:1fr}.nav{display:flex;overflow:auto}.nav button{min-width:110px}.formats{grid-template-columns:repeat(2,1fr)}.field{flex-direction:column}.settings{grid-template-columns:1fr}}
</style></head><body>
<div id="auth" class="modal"><div class="card"><h2 id="authTitle">登录</h2><p class="muted" id="authText"></p><input id="password" type="password" placeholder="管理员密码"><p id="authError" class="error"></p><button id="authBtn" class="btn blue">继续</button></div></div>
<div class="shell"><div class="top"><div><h1>Media Download Hub</h1><div class="muted">统一流媒体解析与下载中心</div></div><div class="row"><span id="health" class="pill">检查中</span><button class="btn ghost" onclick="logout()">退出</button></div></div><div class="layout">
<nav class="nav"><button class="active" data-page="new">解析下载</button><button data-page="tasks">任务中心</button><button data-page="cookies">Cookie</button><button data-page="settings">设置</button></nav><main>
<section id="page-new" class="section active"><div class="card"><h2>粘贴媒体链接</h2><div class="field"><textarea id="url" placeholder="支持 YouTube、Bilibili、TikTok、X、Twitch、公开 m3u8/HLS/DASH"></textarea><div><select id="probeCookie"><option value="">不使用 Cookie</option></select><br><button id="probeBtn" class="btn blue" style="margin-top:10px;width:100%">开始解析</button></div></div><p id="probeError" class="error"></p></div>
<div id="result" class="result hidden"><h2 id="title" class="title"></h2><div class="quick"><button class="btn blue" onclick="quick('video')">▣ 下载视频</button><button class="btn ghost" onclick="quick('thumbnail')">▧ 下载封面</button><button class="btn purple" onclick="quick('audio')">♫ 下载音频</button><button class="btn ghost" onclick="quick('subtitles')">▤ 下载字幕</button></div><div class="resbox"><h3>更多视频分辨率下载选项</h3><div id="formats" class="formats"></div></div><p id="summary" class="muted"></p></div></section>
<section id="page-tasks" class="section"><div class="card"><div class="row space"><h2>任务中心</h2><button class="btn ghost" onclick="loadTasks()">刷新</button></div><div id="taskList"></div></div></section>
<section id="page-cookies" class="section"><div class="card"><h2>Cookie 管理</h2><p class="muted">YouTube 数据中心 IP 被限制时，请上传浏览器导出的 Netscape cookies.txt。</p><form id="cookieForm"><div class="settings"><label>平台<input id="cookiePlatform" value="youtube"></label><label>备注<input id="cookieLabel" placeholder="我的 YouTube Cookie"></label></div><input id="cookieFile" type="file" accept=".txt" style="margin-top:12px"><br><button class="btn blue" style="margin-top:12px">上传</button></form><div id="cookieList"></div></div></section>
<section id="page-settings" class="section"><div class="card"><h2>系统设置</h2><div class="settings"><label>最大文件 GB<input id="maxFile" type="number"></label><label>最高分辨率<input id="maxRes" type="number"></label><label>保留小时<input id="retention" type="number"></label><label>最低剩余空间 GB<input id="minFree" type="number"></label><label>请求间隔秒<input id="sleep" type="number"></label><label>代理<input id="proxy" placeholder="socks5h://user:pass@host:port"></label></div><button id="saveSettings" class="btn blue" style="margin-top:16px">保存</button><span id="settingsMsg" class="good"></span></div></section>
</main></div></div><script>
const $=x=>document.getElementById(x);let token=localStorage.mediaToken||'',setup=false,probe=null,timer=null;const koofrStatusCache=new Map(),taskStatusCache=new Map(),koofrStatusInFlight=new Set();
async function api(p,o={}){o.headers={...(o.headers||{}),...(token?{Authorization:`Bearer ${token}`}:{})};if(o.body&&!(o.body instanceof FormData)){o.headers['Content-Type']='application/json';o.body=JSON.stringify(o.body)}const r=await fetch(p,o);let d;try{d=await r.json()}catch{d={detail:await r.text()}}if(!r.ok){if(r.status===401){token='';localStorage.removeItem('mediaToken');$('auth').classList.remove('hidden')}throw new Error(typeof d.detail==='string'?d.detail:(d.detail?.message||JSON.stringify(d.detail)))}return d}
function esc(s=''){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function fmt(n){if(!n)return'';for(const u of ['B','KB','MB','GB']){if(n<1024)return n.toFixed(1)+' '+u;n/=1024}return n.toFixed(1)+' TB'}
async function init(){const s=await api('/api/auth/status');setup=s.setup_required;$('authTitle').textContent=setup?'首次初始化':'管理员登录';$('authText').textContent=setup?'设置至少 8 位管理员密码':'输入管理员密码';if(token){$('auth').classList.add('hidden');boot()}}
$('authBtn').onclick=async()=>{try{const d=await api(setup?'/api/auth/setup':'/api/auth/login',{method:'POST',body:{password:$('password').value}});token=d.token;localStorage.mediaToken=token;$('auth').classList.add('hidden');boot()}catch(e){$('authError').textContent=e.message}};function logout(){token='';localStorage.removeItem('mediaToken');$('auth').classList.remove('hidden')}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.nav button').forEach(x=>x.classList.toggle('active',x===b));document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));$(`page-${b.dataset.page}`).classList.add('active');if(b.dataset.page==='tasks')loadTasks();if(b.dataset.page==='cookies')loadCookies();if(b.dataset.page==='settings')loadSettings()});
async function boot(){await Promise.all([health(),loadCookies(),loadTasks(false)]);clearInterval(timer);timer=setInterval(()=>{health();loadTasks(false)},3000)}async function health(){try{const h=await api('/api/health');$('health').textContent=h.ok?'系统正常 · 19190':'组件缺失';$('health').className='pill '+(h.ok?'good':'error')}catch{$('health').textContent='连接失败'}}
$('probeBtn').onclick=async()=>{try{$('probeBtn').disabled=true;$('probeError').textContent='正在解析……';probe=await api('/api/probe',{method:'POST',body:{url:$('url').value,cookie_id:$('probeCookie').value||null}});$('probeError').textContent='';$('result').classList.remove('hidden');$('title').textContent=probe.title||'未命名媒体';$('summary').textContent=`平台：${probe.platform||'-'} · 作者：${probe.uploader||'-'} · 时长：${probe.duration?Math.round(probe.duration/60)+' 分钟':'未知'} · 字幕：${probe.subtitles.length}`;$('formats').innerHTML=(probe.video_options||[]).map(f=>`<button class="format" onclick='videoFormat(${JSON.stringify(f)})'>${esc(f.label)} (.${esc(f.ext)}) ${f.has_audio?'🔊':'🔇'}<small>${f.filesize?fmt(f.filesize):''}</small></button>`).join('')||'<p>没有可用的视频格式</p>'}catch(e){$('probeError').textContent=e.message}finally{$('probeBtn').disabled=false}};
async function createTask(mode,opt={}){if(!probe)return;try{await api('/api/tasks',{method:'POST',body:{url:probe.webpage_url,title:probe.title,platform:probe.platform,options:{mode,engine:mode==='live'?'streamlink':'auto',resolution:opt.height||1080,format_id:opt.format_id||null,format_has_audio:!!opt.has_audio,audio_format:mode==='audio'?'mp3':'original',write_thumbnail:false,embed_metadata:true,cookie_id:$('probeCookie').value||null,subtitle_languages:['zh-CN','zh','en'],stream_quality:'best'}}});document.querySelector('[data-page="tasks"]').click()}catch(e){alert(e.message)}}function quick(m){createTask(m)}function videoFormat(f){createTask('video',f)}
function inlineArg(v){return esc(JSON.stringify(String(v??'')))}
function fileName(p=''){return String(p||'').split(/[\\/]/).pop()||'下载文件'}
function reparseTask(encodedUrl){
    const url=decodeURIComponent(encodedUrl);
    const nav=document.querySelector('[data-page="new"]');
    if(nav)nav.click();
    const input=document.getElementById('url');
    if(input){
        input.value=url;
        input.dispatchEvent(new Event('input',{bubbles:true}));
        input.focus();
        input.scrollIntoView({behavior:'smooth',block:'center'});
    }
    const error=document.getElementById('probeError');
    if(error)error.textContent='原文件已清除，请重新点击“开始解析”。';
}
function taskFileArea(t){
    const encodedUrl=encodeURIComponent(t.url||''),sourceArg=inlineArg(encodedUrl),idArg=inlineArg(t.id),koofr=t.koofr||{};
    if(t.status==='completed'){
        const name=fileName(t.output_path),size=fmt(Number(t.output_size||0))||'未知大小';
        const subtitleFailure=t.options&&t.options.mode==='subtitles'&&String(t.log_tail||'').includes('字幕下载完成，但保存到 Koofr 失败');
        const statusClass=koofr.saved?'good':subtitleFailure?'error':'muted';
        const statusText=koofr.saved?`已保存到 Koofr<br>云盘路径：${esc(koofr.path||'')}`:subtitleFailure?'字幕下载完成，但保存到 Koofr 失败':'';
        const saveLabel=subtitleFailure?'重新保存到 Koofr':'保存到 Koofr';
        return `<div class="task task-file"><div class="row space"><strong>文件</strong><span class="good">${esc(name)}</span></div><div class="row"><span class="muted">${esc(size)}</span><button class="btn blue" onclick="downloadFile(${idArg},${sourceArg})">下载文件</button><button class="btn ghost" onclick="saveToKoofr(${idArg},this)">${saveLabel}</button></div><p class="muted">本地文件仍会按系统设置自动清理；下载文件和保存到 Koofr 都不会延长本地保留时间。</p><p class="${statusClass} koofr-status">${statusText}</p></div>`;
    }
    if(t.status==='expired'){
        if(koofr.saved)return `<div class="task"><div class="row space"><strong>文件</strong><span class="error">文件已自动清除</span></div><p class="good">Koofr 副本仍然存在<br>云盘路径：${esc(koofr.path||'')}</p><button class="btn blue" onclick="downloadKoofr(${idArg})">从 Koofr 下载</button><button class="btn ghost" onclick="reparseTask(${sourceArg})">重新解析</button></div>`;
        return `<div class="task"><div class="row space"><strong>文件</strong><span class="error">文件已自动清除</span></div><p><span class="muted">原解析链接：</span><span>${esc(t.url||'')}</span></p><button class="btn ghost" onclick="reparseTask(${sourceArg})">重新解析</button></div>`;
    }
    return '';
}
async function loadTasks(render=true){
    if(!token)return;
    try{
        const a=await api(render?'/api/tasks?include_koofr=1':'/api/tasks');
        if(!render&&!document.querySelector('[data-page="tasks"]').classList.contains('active'))return;
        const statusRefreshes=[];
        const tasks=a.map(t=>{
            const id=String(t.id||'');
            const previous=taskStatusCache.get(id);
            if(t.koofr)koofrStatusCache.set(id,t.koofr);
            if(t.status==='completed'&&previous&&previous!=='completed'&&!koofrStatusInFlight.has(id)){
                koofrStatusInFlight.add(id);
                statusRefreshes.push(api(`/api/tasks/${encodeURIComponent(id)}/koofr-status`).then(status=>koofrStatusCache.set(id,status)).catch(()=>koofrStatusCache.set(id,{saved:false,path:'',files:[],size:0})).finally(()=>koofrStatusInFlight.delete(id)));
            }
            taskStatusCache.set(id,t.status);
            if(!t.koofr&&koofrStatusCache.has(id))t.koofr=koofrStatusCache.get(id);
            return t;
        });
        if(statusRefreshes.length){await Promise.all(statusRefreshes);tasks.forEach(t=>{if(!t.koofr&&koofrStatusCache.has(String(t.id||'')))t.koofr=koofrStatusCache.get(String(t.id||''))})}
        $('taskList').innerHTML=tasks.map(t=>`<div class="task"><div class="row space"><strong>${esc(t.title||t.url)}</strong><span>${esc(t.status)}</span></div><div class="progress"><span style="width:${Math.max(0,Math.min(100,t.progress||0))}%"></span></div><div class="row"><span>${Number(t.progress||0).toFixed(1)}%</span><span class="muted">${esc(t.speed||'')}</span>${['queued','downloading'].includes(t.status)?`<button class="btn danger" onclick="act(${inlineArg(t.id)},'cancel')">取消</button>`:''}${['failed','cancelled'].includes(t.status)?`<button class="btn ghost" onclick="act(${inlineArg(t.id)},'retry')">重试</button>`:''}<button class="btn danger" onclick="del(${inlineArg(t.id)})">删除</button></div>${taskFileArea(t)}${t.error_message?`<p class="error">${esc(t.error_code)}：${esc(t.error_message)}</p>`:''}${t.log_tail?`<details><summary>诊断日志</summary><pre>${esc(t.log_tail)}</pre></details>`:''}</div>`).join('')||'<p class="muted">暂无任务</p>';
    }catch(e){console.error(e)}
}
async function act(i,a){await api(`/api/tasks/${i}/${a}`,{method:'POST'});loadTasks()}
async function del(i){if(confirm('确定删除？')){await api(`/api/tasks/${i}`,{method:'DELETE'});loadTasks()}}
async function downloadFile(i,encodedSourceUrl){
    let r;
    try{r=await fetch(`/api/tasks/${i}/download`,{headers:{Authorization:`Bearer ${token}`}})}catch{return alert('下载失败')}
    if(r.status===404){
        alert('文件已被清除或不存在，请使用原链接重新解析。');
        reparseTask(encodedSourceUrl);
        return;
    }
    if(!r.ok)return alert('下载失败');
    const b=await r.blob(),a=document.createElement('a'),objectUrl=URL.createObjectURL(b);
    a.href=objectUrl;
    a.download='media';
    a.click();
    URL.revokeObjectURL(objectUrl);
}
async function saveToKoofr(i,button){
    const status=button.closest('.task-file').querySelector('.koofr-status');
    button.disabled=true;
    try{
        const d=await api(`/api/tasks/${encodeURIComponent(i)}/save-to-koofr`,{method:'POST'});
        koofrStatusCache.set(String(i),d);
        status.className='good koofr-status';
        status.textContent=`已保存到 Koofr\n云盘路径：${d.path||''}`;
        button.textContent='已保存到 Koofr';
    }catch(e){
        status.className='error koofr-status';
        status.textContent=e.message;
    }finally{button.disabled=false}
}
function responseFileName(response,fallback){
    const header=response.headers.get('content-disposition')||'';
    const encoded=header.match(/filename\*=UTF-8''([^;]+)/i);
    if(encoded){try{return decodeURIComponent(encoded[1].trim().replace(/^"|"$/g,''))}catch{}}
    const plain=header.match(/filename="?([^";]+)"?/i);
    return plain?plain[1].trim():fallback;
}
async function downloadKoofr(i){
    let r;
    try{r=await fetch(`/api/tasks/${encodeURIComponent(i)}/koofr-download`,{headers:{Authorization:`Bearer ${token}`}})}catch{return alert('Koofr 下载失败')}
    if(!r.ok)return alert('Koofr 副本不存在或下载失败');
    const b=await r.blob(),a=document.createElement('a'),objectUrl=URL.createObjectURL(b);
    a.href=objectUrl;
    a.download=responseFileName(r,'koofr-files.zip');
    a.click();
    setTimeout(()=>URL.revokeObjectURL(objectUrl),0);
}
async function loadCookies(){if(!token)return;const a=await api('/api/cookies');$('probeCookie').innerHTML='<option value="">不使用 Cookie</option>'+a.map(x=>`<option value="${x.id}">${esc(x.platform)} · ${esc(x.label)}</option>`).join('');$('cookieList').innerHTML=a.map(x=>`<div class="task row space"><span>${esc(x.label)} · ${esc(x.name)}</span><button class="btn danger" onclick="removeCookie('${x.id}')">删除</button></div>`).join('')}
$('cookieForm').onsubmit=async e=>{e.preventDefault();const f=$('cookieFile').files[0];if(!f)return alert('请选择 Cookie 文件');const d=new FormData();d.append('file',f);await api(`/api/cookies?platform=${encodeURIComponent($('cookiePlatform').value)}&label=${encodeURIComponent($('cookieLabel').value)}`,{method:'POST',body:d});e.target.reset();loadCookies()};async function removeCookie(i){await api(`/api/cookies/${i}`,{method:'DELETE'});loadCookies()}
async function loadSettings(){const s=await api('/api/settings');$('maxFile').value=s.max_file_size_gb;$('maxRes').value=s.max_resolution;$('retention').value=s.retention_hours;$('minFree').value=s.min_free_gb;$('sleep').value=s.request_sleep_seconds;$('proxy').value=s.proxy_url||''}$('saveSettings').onclick=async()=>{await api('/api/settings',{method:'PUT',body:{max_file_size_gb:+$('maxFile').value,max_resolution:+$('maxRes').value,retention_hours:+$('retention').value,min_free_gb:+$('minFree').value,request_sleep_seconds:+$('sleep').value,proxy_url:$('proxy').value,youtube_compatibility_mode:true}});$('settingsMsg').textContent=' 已保存'};init().catch(e=>$('authError').textContent=e.message)
</script></body></html>
