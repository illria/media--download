<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Media Download Hub</title>
  <link rel="stylesheet" href="/assets/theme.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>Media Download Hub</h1>
        <p>在线视频解析与下载</p>
      </div>
      <div class="top-actions">
        <span id="guestHealth" class="pill" aria-live="polite">
          <span class="dot idle" aria-hidden="true"></span>
          <span id="guestHealthText">检查服务状态…</span>
        </span>
        <a class="btn btn-ghost btn-quiet" href="/admin">管理员入口</a>
      </div>
    </header>

    <section class="card" aria-labelledby="probeTitle">
      <div class="card-head">
        <div>
          <h2 id="probeTitle">粘贴媒体链接</h2>
          <p class="muted">公开可访问链接可直接解析，无需登录。</p>
        </div>
      </div>
      <form id="probeForm" class="hero-input">
        <div class="field">
          <label for="guestUrl">媒体链接</label>
          <textarea id="guestUrl" name="url" rows="3" placeholder="粘贴 YouTube、Bilibili、TikTok、X、Twitch 或公开媒体链接" autocomplete="off" spellcheck="false"></textarea>
        </div>
        <div class="actions">
          <button id="probeBtn" class="btn btn-primary" type="submit">开始解析</button>
          <button id="refreshTasksBtn" class="btn btn-secondary" type="button">刷新我的任务</button>
        </div>
        <div class="support-note chips" aria-label="支持平台提示">
          <span class="status-chip">YouTube</span>
          <span class="status-chip">Bilibili</span>
          <span class="status-chip">TikTok</span>
          <span class="status-chip">X</span>
          <span class="status-chip">Twitch</span>
          <span class="status-chip">公开媒体链接</span>
        </div>
        <p id="probeStatus" class="live-region muted" aria-live="polite"></p>
      </form>
      <div class="chips" style="margin-top:14px" aria-label="游客限制说明">
        <span class="status-chip">单文件最大 1 GB</span>
        <span class="status-chip">最高 1080p</span>
        <span class="status-chip">完成后保留 30 分钟</span>
        <span class="status-chip">AI 字幕最长 20 分钟</span>
      </div>
    </section>

    <section id="resultCard" class="card hidden" aria-labelledby="resultTitle">
      <div class="result-grid">
        <img id="resultThumb" class="thumb" alt="媒体缩略图">
        <div>
          <h2 id="resultTitle">解析结果</h2>
          <div id="resultMeta" class="meta-list"></div>
          <div class="action-grid" role="group" aria-label="下载类型">
            <button type="button" class="btn btn-primary" data-mode="video">下载视频</button>
            <button type="button" class="btn btn-secondary" data-mode="audio">下载音频</button>
            <button type="button" class="btn btn-secondary" data-mode="thumbnail">下载封面</button>
            <button type="button" class="btn btn-secondary" data-mode="subtitles" title="优先下载平台字幕；没有字幕时将尝试 AI 生成">获取字幕</button>
          </div>
          <p class="help" style="margin-top:10px">获取字幕：优先下载平台字幕；没有字幕时将尝试 AI 生成。</p>
          <div id="videoFormats" class="format-grid" aria-label="视频清晰度"></div>
          <div id="audioFormats" class="format-grid" aria-label="音频格式" style="margin-top:10px"></div>
          <p id="createStatus" class="live-region muted" aria-live="polite"></p>
        </div>
      </div>
    </section>

    <section class="card" aria-labelledby="tasksTitle">
      <div class="card-head">
        <div>
          <h2 id="tasksTitle">我的任务</h2>
          <p class="muted">只显示当前浏览器游客会话下的任务。</p>
        </div>
        <button id="manualRefreshBtn" class="btn btn-secondary btn-quiet" type="button">立即刷新</button>
      </div>
      <div id="taskList" aria-live="polite"></div>
    </section>

    <footer class="footer-note">
      游客任务完成后约保留 30 分钟。服务会根据磁盘与队列自动保护，必要时暂停接收新任务。
    </footer>
  </div>
  <script src="/assets/guest.js" defer></script>
</body>
</html>
