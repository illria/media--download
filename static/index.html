<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Media Download Hub</title>
<style>
:root{color-scheme:dark;--bg:#07111f;--panel:#0d1b2e;--panel2:#12233a;--line:#233a58;--text:#eef6ff;--muted:#91a8c2;--accent:#47b8ff;--good:#4dde9f;--bad:#ff6b7d;--warn:#ffc857}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#123056 0,#07111f 44%);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"PingFang SC",sans-serif;color:var(--text)}button,input,select{font:inherit}.hidden{display:none!important}.shell{max-width:1180px;margin:auto;padding:24px}.top{display:flex;justify-content:space-between;gap:18px;align-items:center;margin-bottom:24px}.brand h1{font-size:25px;margin:0}.brand p{color:var(--muted);margin:7px 0 0}.pill{border:1px solid var(--line);background:#0b1728;padding:8px 12px;border-radius:999px;color:var(--muted)}.layout{display:grid;grid-template-columns:220px 1fr;gap:20px}.nav,.card{background:rgba(13,27,46,.94);border:1px solid var(--line);border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.18)}.nav{padding:12px;height:max-content;position:sticky;top:18px}.nav button{width:100%;border:0;background:transparent;color:var(--muted);padding:13px;text-align:left;border-radius:12px;cursor:pointer}.nav button.active,.nav button:hover{background:var(--panel2);color:var(--text)}.card{padding:22px;margin-bottom:18px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.field label{display:block;color:var(--muted);font-size:13px;margin-bottom:7px}.field input,.field select{width:100%;padding:11px 12px;border-radius:11px;border:1px solid var(--line);background:#091729;color:var(--text)}textarea{width:100%;min-height:90px;border:1px solid var(--line);border-radius:12px;background:#091729;color:var(--text);padding:12px;resize:vertical}.btn{border:0;border-radius:11px;padding:11px 16px;background:var(--accent);color:#03111d;font-weight:700;cursor:pointer}.btn.secondary{background:#19314e;color:var(--text)}.btn.danger{background:#512231;color:#ffdbe0}.btn:disabled{opacity:.55;cursor:not-allowed}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.space{justify-content:space-between}.muted{color:var(--muted)}.error{color:#ff9cab}.good{color:var(--good)}.warning{color:var(--warn)}.preview{display:grid;grid-template-columns:180px 1fr;gap:18px}.preview img{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:12px;background:#081321}.task{border:1px solid var(--line);background:#091729;border-radius:14px;padding:15px;margin-top:12px}.task h3{margin:0 0 7px;font-size:15px}.meta{display:flex;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:13px}.progress{height:8px;background:#152841;border-radius:99px;overflow:hidden;margin:12px 0}.progress span{display:block;height:100%;background:linear-gradient(90deg,#47b8ff,#55e8bd)}.badge{display:inline-flex;border-radius:999px;padding:4px 9px;font-size:12px;background:#1b3452}.badge.completed{color:var(--good)}.badge.failed{color:var(--bad)}.badge.downloading{color:var(--accent)}.badge.queued{color:var(--warn)}pre{background:#07111f;border:1px solid var(--line);border-radius:12px;padding:13px;white-space:pre-wrap;max-height:240px;overflow:auto;color:#b9cbe0}.stat{background:#091729;border:1px solid var(--line);border-radius:13px;padding:16px}.stat strong{display:block;font-size:22px;margin-top:6px}.modal{position:fixed;inset:0;background:rgba(1,7,14,.82);display:grid;place-items:center;padding:20px;z-index:20}.modal .card{width:min(430px,100%);margin:0}.section{display:none}.section.active{display:block}@media(max-width:760px){.layout{grid-template-columns:1fr}.nav{position:static;display:flex;overflow:auto}.nav button{min-width:120px}.grid,.grid3,.preview{grid-template-columns:1fr}.shell{padding:14px}.top{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<div id="auth" class="modal"><div class="card"><h2 id="authTitle">登录</h2><p class="muted" id="authText">输入管理员密码</p><div class="field"><label>管理员密码</label><input id="password" type="password" autocomplete="current-password"></div><p id="authError" class="error"></p><button class="btn" id="authBtn">继续</button></div></div>
<div class="shell">
<div class="top"><div class="brand"><h1>Media Download Hub</h1><p>统一流媒体解析、音频提取与直播录制</p></div><div class="row"><span class="pill" id="healthPill">正在检查系统</span><button class="btn secondary" onclick="logout()">退出</button></div></div>
<div class="layout">
<nav class="nav"><button class="active" data-page="new">新建任务</button><button data-page="tasks">任务中心</button><button data-page="library">媒体库</button><button data-page="cookies">Cookie</button><button data-page="settings">系统设置</button></nav>
<main>
<section id="page-new" class="section active">
<div class="card"><h2>解析媒体链接</h2><p class="muted">支持 yt-dlp 可识别的公开点播站点，以及 Streamlink 可识别的直播和公开 HLS/DASH。DRM 内容只检测，不解密。</p><textarea id="url" placeholder="粘贴 YouTube、Bilibili、TikTok、X、Twitch 或公开 m3u8 链接"></textarea><div class="row" style="margin-top:12px"><select id="probeCookie" style="max-width:260px"></select><button class="btn" id="probeBtn">解析链接</button><span id="probeError" class="error"></span></div></div>
<div id="probeResult" class="card hidden"><div class="preview"><img id="thumb"><div><div class="row"><span id="platform" class="badge"></span><span id="liveBadge" class="badge hidden">直播</span><span id="drmBadge" class="badge failed hidden">DRM</span></div><h2 id="title"></h2><p class="muted" id="summary"></p></div></div><hr style="border:0;border-top:1px solid var(--line);margin:20px 0"><div class="grid3"><div class="field"><label>任务类型</label><select id="mode"><option value="video">视频下载</option><option value="audio">仅音频</option><option value="live">直播录制</option></select></div><div class="field"><label>最高分辨率</label><select id="resolution"><option>1080</option><option>720</option><option>480</option><option>2160</option></select></div><div class="field"><label>输出格式</label><select id="outputFormat"><option value="original">保持原始音频</option><option value="mp3">MP3</option><option value="m4a">M4A</option><option value="opus">Opus</option><option value="wav">WAV</option><option value="flac">FLAC</option></select></div><div class="field"><label>开始时间（可选）</label><input id="startTime" placeholder="00:01:30"></div><div class="field"><label>结束时间（可选）</label><input id="endTime" placeholder="00:08:00"></div><div class="field"><label>字幕语言，逗号分隔</label><input id="subtitles" placeholder="zh-CN,zh,en"></div></div><div class="row" style="margin-top:16px"><button class="btn" id="createBtn">加入下载队列</button><label><input id="thumbnail" type="checkbox" checked> 下载封面</label><label><input id="metadata" type="checkbox" checked> 写入元数据</label></div></div>
</section>
<section id="page-tasks" class="section"><div class="card"><div class="row space"><div><h2>任务中心</h2><p class="muted">服务器按单任务队列依次执行。</p></div><button class="btn secondary" onclick="loadTasks()">刷新</button></div><div id="taskList"></div></div></section>
<section id="page-library" class="section"><div class="card"><h2>媒体库</h2><p class="muted">这里仅显示已完成并仍在保留期内的文件。</p><div id="libraryList"></div></div></section>
<section id="page-cookies" class="section"><div class="card"><h2>Cookie 管理</h2><p class="muted">上传 Netscape cookies.txt。文件会在服务器加密保存，不在页面回显。</p><form id="cookieForm"><div class="grid"><div class="field"><label>平台</label><input id="cookiePlatform" placeholder="youtube"></div><div class="field"><label>备注</label><input id="cookieLabel" placeholder="我的 YouTube 账号"></div></div><div class="field" style="margin-top:12px"><label>Cookie 文件</label><input id="cookieFile" type="file" accept=".txt"></div><button class="btn" style="margin-top:12px">上传</button></form><div id="cookieList" style="margin-top:18px"></div></div></section>
<section id="page-settings" class="section"><div class="grid3"><div class="stat"><span class="muted">磁盘占用</span><strong id="diskUse">-</strong></div><div class="stat"><span class="muted">可用空间</span><strong id="diskFree">-</strong></div><div class="stat"><span class="muted">解析工具</span><strong id="toolStatus">-</strong></div></div><div class="card" style="margin-top:18px"><h2>系统限制</h2><div class="grid3"><div class="field"><label>最大文件 GB</label><input id="maxFile" type="number"></div><div class="field"><label>默认最高分辨率</label><input id="maxRes" type="number"></div><div class="field"><label>完成文件保留小时</label><input id="retention" type="number"></div><div class="field"><label>最低可用空间 GB</label><input id="minFree" type="number"></div><div class="field"><label>最长普通视频分钟</label><input id="maxVideo" type="number"></div><div class="field"><label>最长直播分钟</label><input id="maxLive" type="number"></div></div><div class="field" style="margin-top:14px"><label>默认代理（HTTP/HTTPS/SOCKS5/SOCKS5H，可留空）</label><input id="proxy" type="password" placeholder="socks5h://user:pass@host:port"></div><button class="btn" id="saveSettings" style="margin-top:15px">保存设置</button><span id="settingsMsg" class="good" style="margin-left:10px"></span></div></section>
</main></div></div>
<script>
const $=id=>document.getElementById(id);let token=localStorage.getItem('mediaToken')||'';let setup=false;let probeData=null;let timer=null;
async function api(path,options={}){options.headers={...(options.headers||{}),...(token?{Authorization:`Bearer ${token}`}:{})};if(options.body&&!(options.body instanceof FormData)){options.headers['Content-Type']='application/json';options.body=JSON.stringify(options.body)}const r=await fetch(path,options);let data;try{data=await r.json()}catch{data={detail:await r.text()}}if(!r.ok){if(r.status===401){token='';localStorage.removeItem('mediaToken');$('auth').classList.remove('hidden')}throw new Error(typeof data.detail==='string'?data.detail:(data.detail?.message||JSON.stringify(data.detail)))}return data}
function fmt(n){if(!n&&n!==0)return'-';const u=['B','KB','MB','GB','TB'];let i=0;while(n>=1024&&i<u.length-1){n/=1024;i++}return`${n.toFixed(i?1:0)} ${u[i]}`}
function esc(v=''){return String(v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
async function initAuth(){const s=await api('/api/auth/status');setup=s.setup_required;$('authTitle').textContent=setup?'首次初始化':'管理员登录';$('authText').textContent=setup?'请设置至少 8 位管理员密码':'输入管理员密码后进入面板';if(token){$('auth').classList.add('hidden');await boot()}else $('auth').classList.remove('hidden')}
$('authBtn').onclick=async()=>{try{$('authError').textContent='';const data=await api(setup?'/api/auth/setup':'/api/auth/login',{method:'POST',body:{password:$('password').value}});token=data.token;localStorage.setItem('mediaToken',token);$('auth').classList.add('hidden');await boot()}catch(e){$('authError').textContent=e.message}};
function logout(){token='';localStorage.removeItem('mediaToken');$('auth').classList.remove('hidden')}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.nav button').forEach(x=>x.classList.toggle('active',x===b));document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));$(`page-${b.dataset.page}`).classList.add('active');if(b.dataset.page==='tasks')loadTasks();if(b.dataset.page==='library')loadTasks();if(b.dataset.page==='cookies')loadCookies();if(b.dataset.page==='settings')loadSettings()});
async function boot(){await Promise.all([health(),loadCookies(),loadTasks()]);clearInterval(timer);timer=setInterval(()=>{if(token){health();loadTasks(false)}},3000)}
async function health(){try{const h=await api('/api/health');$('healthPill').textContent=h.ok?'系统正常 · 19190':'系统异常';$('diskUse').textContent=h.disk.percent+'%';$('diskFree').textContent=fmt(h.disk.free);$('toolStatus').textContent=Object.values(h.tools).every(Boolean)?'全部可用':'存在缺失'}catch{$('healthPill').textContent='无法连接'}}
$('probeBtn').onclick=async()=>{try{$('probeBtn').disabled=true;$('probeError').textContent='正在解析…';probeData=await api('/api/probe',{method:'POST',body:{url:$('url').value,cookie_id:$('probeCookie').value||null}});$('probeError').textContent='';$('probeResult').classList.remove('hidden');$('thumb').src=probeData.thumbnail||'';$('title').textContent=probeData.title||'未命名媒体';$('platform').textContent=probeData.platform||'未知平台';$('summary').textContent=`作者：${probeData.uploader||'-'} · 时长：${probeData.duration?Math.round(probeData.duration/60)+' 分钟':'未知'} · 格式：${probeData.formats.length} · 字幕：${probeData.subtitles.length}`;$('liveBadge').classList.toggle('hidden',!probeData.is_live);$('drmBadge').classList.toggle('hidden',!probeData.drm);if(probeData.is_live)$('mode').value='live'}catch(e){$('probeError').textContent=e.message}finally{$('probeBtn').disabled=false}};
$('createBtn').onclick=async()=>{if(!probeData)return;try{const mode=$('mode').value;if(probeData.drm)throw new Error('检测到 DRM，无法创建任务');await api('/api/tasks',{method:'POST',body:{url:probeData.webpage_url,title:probeData.title,platform:probeData.platform,options:{mode,engine:mode==='live'?'streamlink':'auto',resolution:Number($('resolution').value),audio_format:$('outputFormat').value,video_container:'mp4',start_time:$('startTime').value||null,end_time:$('endTime').value||null,subtitle_languages:$('subtitles').value.split(',').map(x=>x.trim()).filter(Boolean),write_thumbnail:$('thumbnail').checked,embed_metadata:$('metadata').checked,cookie_id:$('probeCookie').value||null,stream_quality:'best'}}});alert('任务已加入队列');document.querySelector('[data-page="tasks"]').click()}catch(e){alert(e.message)}};
async function loadTasks(render=true){if(!token)return;try{const tasks=await api('/api/tasks');if(!render&&document.querySelector('[data-page="tasks"]').classList.contains('active')===false)return;const cards=tasks.map(t=>`<div class="task"><div class="row space"><div><h3>${esc(t.title||t.url)}</h3><div class="meta"><span>${esc(t.platform||'未知')}</span><span>${new Date(t.created_at).toLocaleString()}</span><span>${fmt(t.output_size)}</span></div></div><span class="badge ${t.status}">${esc(t.status)}</span></div><div class="progress"><span style="width:${Math.max(0,Math.min(100,t.progress||0))}%"></span></div><div class="row"><span class="muted">${Number(t.progress||0).toFixed(1)}%</span><span class="muted">${esc(t.speed||'')}</span><span class="muted">${esc(t.eta||'')}</span>${['queued','downloading','processing'].includes(t.status)?`<button class="btn danger" onclick="taskAction('${t.id}','cancel')">取消</button>`:''}${['failed','cancelled','expired'].includes(t.status)?`<button class="btn secondary" onclick="taskAction('${t.id}','retry')">重试</button>`:''}${t.status==='completed'?`<button class="btn" onclick="downloadFile('${t.id}')">下载文件</button>`:''}${!['queued','downloading','processing'].includes(t.status)?`<button class="btn danger" onclick="taskDelete('${t.id}')">删除</button>`:''}</div>${t.error_message?`<p class="error">${esc(t.error_code)}：${esc(t.error_message)}</p>`:''}${t.log_tail?`<details><summary class="muted">诊断日志</summary><pre>${esc(t.log_tail)}</pre></details>`:''}</div>`).join('')||'<p class="muted">暂无任务</p>';$('taskList').innerHTML=cards;$('libraryList').innerHTML=tasks.filter(t=>t.status==='completed').map(t=>`<div class="task"><div class="row space"><div><h3>${esc(t.title||'媒体文件')}</h3><div class="meta"><span>${esc(t.platform||'')}</span><span>${fmt(t.output_size)}</span></div></div><button class="btn" onclick="downloadFile('${t.id}')">下载</button></div></div>`).join('')||'<p class="muted">媒体库为空</p>'}catch(e){console.error(e)}}
async function taskAction(id,action){try{await api(`/api/tasks/${id}/${action}`,{method:'POST'});loadTasks()}catch(e){alert(e.message)}}async function taskDelete(id){if(!confirm('确定删除任务记录和服务器文件？'))return;try{await api(`/api/tasks/${id}`,{method:'DELETE'});loadTasks()}catch(e){alert(e.message)}}async function downloadFile(id){const r=await fetch(`/api/tasks/${id}/download`,{headers:{Authorization:`Bearer ${token}`}});if(!r.ok)return alert('文件下载失败');const blob=await r.blob();const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(r.headers.get('content-disposition')||'').match(/filename="?([^";]+)/)?.[1]||'media';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
async function loadCookies(){if(!token)return;try{const list=await api('/api/cookies');$('probeCookie').innerHTML='<option value="">不使用 Cookie</option>'+list.map(x=>`<option value="${x.id}">${esc(x.platform)} · ${esc(x.label)}</option>`).join('');$('cookieList').innerHTML=list.map(x=>`<div class="task row space"><div><strong>${esc(x.label)}</strong><div class="muted">${esc(x.platform)} · ${esc(x.original_name)}</div></div><button class="btn danger" onclick="removeCookie('${x.id}')">删除</button></div>`).join('')||'<p class="muted">尚未保存 Cookie</p>'}catch(e){console.error(e)}}
$('cookieForm').onsubmit=async e=>{e.preventDefault();const file=$('cookieFile').files[0];if(!file)return alert('请选择文件');const fd=new FormData();fd.append('file',file);try{await api(`/api/cookies?platform=${encodeURIComponent($('cookiePlatform').value)}&label=${encodeURIComponent($('cookieLabel').value)}`,{method:'POST',body:fd});e.target.reset();loadCookies()}catch(err){alert(err.message)}};async function removeCookie(id){if(!confirm('确定删除？'))return;await api(`/api/cookies/${id}`,{method:'DELETE'});loadCookies()}
async function loadSettings(){try{const s=await api('/api/settings');$('maxFile').value=s.max_file_size_gb;$('maxRes').value=s.max_resolution;$('retention').value=s.retention_hours;$('minFree').value=s.min_free_gb;$('maxVideo').value=s.max_video_minutes;$('maxLive').value=s.max_live_minutes;$('proxy').value=s.proxy_url||'';health()}catch(e){alert(e.message)}}
$('saveSettings').onclick=async()=>{try{await api('/api/settings',{method:'PUT',body:{max_file_size_gb:Number($('maxFile').value),max_resolution:Number($('maxRes').value),retention_hours:Number($('retention').value),min_free_gb:Number($('minFree').value),max_video_minutes:Number($('maxVideo').value),max_live_minutes:Number($('maxLive').value),proxy_url:$('proxy').value}});$('settingsMsg').textContent='已保存';setTimeout(()=>$('settingsMsg').textContent='',1800)}catch(e){alert(e.message)}};
initAuth().catch(e=>{$('authError').textContent=e.message});
</script></body></html>
