services:
  youtube-pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    container_name: youtube-pot-provider
    restart: unless-stopped
    mem_limit: 128m
    pids_limit: 96
    security_opt:
      - no-new-privileges:true

  media-download-hub:
    build:
      context: .
      dockerfile: Dockerfile
    image: media-download-hub:latest
    container_name: media-download-hub
    restart: unless-stopped
    depends_on:
      - youtube-pot-provider
    ports:
      - "19190:19190"
    environment:
      APP_PORT: "19190"
      DATA_ROOT: "/data"
      TZ: "Etc/UTC"
      POT_PROVIDER_URL: "http://youtube-pot-provider:4416"
      COOKIE_ENCRYPTION_KEY: "${COOKIE_ENCRYPTION_KEY:-}"
      SILICONFLOW_API_KEY: "${SILICONFLOW_API_KEY:-}"
    volumes:
      - ./data-v2:/data
    mem_limit: 600m
    pids_limit: 224
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD", "python", "-c", "import json,urllib.request; d=json.load(urllib.request.urlopen('http://127.0.0.1:19190/api/health',timeout=5)); raise SystemExit(0 if d.get('ok') else 1)"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 60s
