name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Compile backend
        run: python -m py_compile app.py
      - name: Import application
        env:
          DATA_ROOT: /tmp/media-hub-ci
        run: python -c "import app; print(app.app.title)"
      - name: Validate frontend entry
        run: grep -q '/api/probe' static/index.html && grep -q '19190' static/index.html
